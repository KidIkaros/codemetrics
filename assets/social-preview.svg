<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g fill="#ffffff" fill-opacity="0.03">
    <rect x="0" y="0" width="1" height="640"/>
    <rect x="100" y="0" width="1" height="640"/>
    <rect x="200" y="0" width="1" height="640"/>
    <rect x="300" y="0" width="1" height="640"/>
    <rect x="400" y="0" width="1" height="640"/>
    <rect x="500" y="0" width="1" height="640"/>
    <rect x="600" y="0" width="1" height="640"/>
    <rect x="700" y="0" width="1" height="640"/>
    <rect x="800" y="0" width="1" height="640"/>
    <rect x="900" y="0" width="1" height="640"/>
    <rect x="1000" y="0" width="1" height="640"/>
    <rect x="1100" y="0" width="1" height="640"/>
    <rect x="1200" y="0" width="1" height="640"/>
  </g>

  <!-- Main logo mark */}
  <g transform="translate(100, 320)" text-anchor="middle">
    <polygon points="-15,-30 15,0 -15,30" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <polygon points="15,-30 -15,0 15,30" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <text x="-45" y="12" font-family="monospace" font-size="36" fill="url(#accent)" font-weight="bold">{</text>
    <text x="45" y="12" font-family="monospace" font-size="36" fill="url(#accent)" font-weight="bold">}</text>
  </g>

  <!-- Wordmark -->
  <text x="480" y="260" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">Code</text>
  <text x="480" y="340" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="url(#accent)">Metrics</text>

  <!-- Tagline -->
  <text x="480" y="400" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#94a3b8">AI-native code quality audit toolkit — 10 tools, zero config</text>

  <!-- Bottom badge -->
  <rect x="480" y="450" width="140" height="36" rx="18" fill="#0891b2" opacity="0.9"/>
  <text x="550" y="475" font-family="Inter, system-ui, sans-serif" font-size="18" fill="white" text-anchor="middle">v1.0.0</text>

  <!-- Command line -->
  <text x="900" y="580" font-family="monospace" font-size="20" fill="#475569" opacity="0.7">$ codemetrics run . --format sarif</text>
</svg>